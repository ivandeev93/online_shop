services:
  web:
    build:
      context: .
      dockerfile: ./app/Dockerfile
    env_file:
      - .env
    command: gunicorn app.main:app \
      --workers 2 \
      --worker-class uvicorn.workers.UvicornWorker \
      --bind 0.0.0.0:8000
    volumes:
      - media_data:/home/fast/media
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network


  db:
    image: postgres:16
    container_name: shop_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network


  db_test:
    image: postgres:16
    container_name: shop_postgres_test
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shop_db_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shop_db_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network


  nginx:
    build:
      context: ./nginx
    volumes:
      - media_data:/var/www/media
    ports:
      - "80:80"
    depends_on:
      - web
    networks:
      - app_network


volumes:
  postgres_data:
  postgres_test_data:
  media_data:


networks:
  app_network: